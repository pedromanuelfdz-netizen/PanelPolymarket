<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Radio Trader</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --tg-bg: #17212b;
      --tg-surface: #242f3d;
      --tg-surface2: #2b5278;
      --tg-blue: #2b9af3;
      --tg-blue-light: #5ab3f7;
      --tg-green: #4dca6e;
      --tg-red: #f36d6d;
      --tg-orange: #f0a644;
      --tg-text: #ffffff;
      --tg-text2: #aab8c2;
      --tg-text3: #5a7385;
      --tg-border: #1c2733;
      --tg-input: #1c2a35;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--tg-bg); color: var(--tg-text); font-family: var(--sans); min-height: 100vh; }

    /* Header */
    .header {
      background: var(--tg-surface);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--tg-border);
      position: sticky; top: 0; z-index: 10;
    }
    .header-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--tg-blue), #1a6fa8);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-name { font-size: 15px; font-weight: 600; color: var(--tg-text); }
    .header-status { font-size: 12px; color: var(--tg-green); display: flex; align-items: center; gap: 4px; }
    .header-status.offline { color: var(--tg-text3); }
    .online-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--tg-green); animation: pulse 2s infinite; }

    /* Chat container */
    .chat { padding: 12px 12px 80px; display: flex; flex-direction: column; gap: 8px; }

    /* Message bubbles */
    .msg { display: flex; flex-direction: column; max-width: 85%; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .bubble {
      padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.5;
    }
    .msg.bot .bubble {
      background: var(--tg-surface);
      border-bottom-left-radius: 4px;
      color: var(--tg-text);
    }
    .msg.user .bubble {
      background: var(--tg-surface2);
      border-bottom-right-radius: 4px;
      color: var(--tg-text);
    }
    .msg-time { font-size: 11px; color: var(--tg-text3); margin-top: 3px; padding: 0 4px; }
    .msg.user .msg-time { text-align: right; }

    /* Card bubble - special styled message */
    .card-bubble {
      background: var(--tg-surface);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      overflow: hidden;
      max-width: 85%;
      align-self: flex-start;
    }
    .card-header {
      background: linear-gradient(135deg, #1a3a52, #0d2133);
      padding: 12px 14px;
      border-bottom: 1px solid var(--tg-border);
    }
    .card-title { font-size: 13px; font-weight: 600; color: var(--tg-text); }
    .card-sub { font-size: 11px; color: var(--tg-text3); margin-top: 2px; }
    .card-body { padding: 12px 14px; }

    /* Price display */
    .price-display {
      display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px;
    }
    .price-main { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--tg-green); }
    .price-label { font-size: 12px; color: var(--tg-text3); }
    .price-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .price-chip {
      background: var(--tg-input); border-radius: 8px; padding: 5px 10px;
      font-family: var(--mono); font-size: 12px; flex: 1; text-align: center;
    }
    .price-chip-label { color: var(--tg-text3); font-size: 10px; margin-bottom: 2px; }
    .price-chip-val { color: var(--tg-text); font-weight: 600; }

    /* Inline buttons (like Telegram inline keyboard) */
    .inline-kb { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .inline-row { display: flex; gap: 6px; }
    .inline-btn {
      flex: 1; background: var(--tg-input);
      border: 1px solid var(--tg-border); border-radius: 10px;
      padding: 10px 8px; text-align: center; cursor: pointer;
      transition: all 0.15s; user-select: none;
      font-family: var(--sans); font-size: 13px; color: var(--tg-text);
    }
    .inline-btn:active { transform: scale(0.96); background: #253545; }
    .inline-btn.selected-blue { background: var(--tg-surface2); border-color: var(--tg-blue); color: var(--tg-blue-light); }
    .inline-btn.selected-red { background: #3d1a1a; border-color: var(--tg-red); color: var(--tg-red); }
    .inline-btn.selected-green { background: #1a3d26; border-color: var(--tg-green); color: var(--tg-green); }
    .inline-btn.selected-orange { background: #3d2d0d; border-color: var(--tg-orange); color: var(--tg-orange); }
    .inline-btn .btn-icon { font-size: 18px; display: block; margin-bottom: 3px; }
    .inline-btn .btn-text { font-size: 11px; color: inherit; }

    /* Market tabs */
    .tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 8px; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      background: var(--tg-input); border: 1px solid var(--tg-border);
      border-radius: 20px; padding: 5px 12px; white-space: nowrap;
      font-size: 12px; color: var(--tg-text3); cursor: pointer; flex-shrink: 0;
    }
    .tab.active { background: var(--tg-blue); border-color: var(--tg-blue); color: white; }

    /* Market list items */
    .market-item {
      background: var(--tg-input); border-radius: 10px; padding: 10px 12px;
      margin-bottom: 6px; cursor: pointer; border: 1px solid transparent;
      transition: all 0.15s;
    }
    .market-item:active { opacity: 0.7; }
    .market-item.selected { border-color: var(--tg-blue); background: #1a2d3d; }
    .market-q { font-size: 13px; color: var(--tg-text); line-height: 1.4; }
    .market-vol { font-size: 11px; color: var(--tg-text3); margin-top: 3px; font-family: var(--mono); }

    /* Signal card */
    .signal-card {
      background: var(--tg-surface);
      border-radius: 16px; border-bottom-left-radius: 4px;
      overflow: hidden; max-width: 85%; align-self: flex-start;
      border: 1px solid var(--tg-border);
    }
    .signal-card.edge-yes { border-color: var(--tg-green); }
    .signal-card.edge-no { border-color: var(--tg-red); }
    .signal-top {
      padding: 12px 14px 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .signal-status { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
    .signal-status.yes { color: var(--tg-green); }
    .signal-status.no { color: var(--tg-red); }
    .signal-status.wait { color: var(--tg-text3); }
    .signal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 14px 12px; }
    .sig-box { background: var(--tg-input); border-radius: 10px; padding: 10px; text-align: center; }
    .sig-box.profit-box { background: #112211; border: 1px solid #2d6b3a; }
    .sig-num { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--tg-text); }
    .sig-num.green { color: var(--tg-green); font-size: 24px; }
    .sig-num.red { color: var(--tg-red); }
    .sig-num.blue { color: var(--tg-blue-light); }
    .sig-lbl { font-size: 10px; color: var(--tg-text3); margin-top: 3px; }
    .sig-sub { font-size: 9px; color: var(--tg-text3); margin-top: 1px; opacity: 0.7; }
    .payout-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--tg-border); }
    .payout-cell { padding: 8px; text-align: center; border-right: 1px solid var(--tg-border); }
    .payout-cell:last-child { border-right: none; }
    .payout-num { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--tg-text2); }
    .payout-lbl { font-size: 9px; color: var(--tg-text3); margin-top: 2px; }

    /* Input area */
    .input-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--tg-surface);
      border-top: 1px solid var(--tg-border);
      padding: 8px 12px;
      z-index: 10;
    }
    .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .input-field {
      flex: 1; background: var(--tg-input);
      border: 1px solid var(--tg-border); border-radius: 22px;
      padding: 10px 16px; font-size: 14px;
      color: var(--tg-text); font-family: var(--sans); outline: none;
    }
    .input-field:focus { border-color: var(--tg-blue); }
    .input-field::placeholder { color: var(--tg-text3); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--tg-blue); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0; transition: all 0.15s;
    }
    .send-btn:active { transform: scale(0.92); }

    /* Amount row in input area */
    .amount-row { display: flex; gap: 6px; align-items: center; }
    .amount-label { font-size: 11px; color: var(--tg-text3); white-space: nowrap; }
    .amount-field {
      width: 80px; background: var(--tg-input);
      border: 1px solid var(--tg-border); border-radius: 10px;
      padding: 6px 10px; font-size: 14px; font-weight: 600;
      color: var(--tg-green); font-family: var(--mono);
      text-align: center; outline: none;
    }
    .amount-field:focus { border-color: var(--tg-green); }
    .qa-btn {
      background: var(--tg-input); border: 1px solid var(--tg-border);
      border-radius: 8px; padding: 5px 8px; font-size: 11px;
      color: var(--tg-text3); cursor: pointer; font-family: var(--mono);
    }
    .qa-btn:active { background: var(--tg-surface2); color: var(--tg-text); }

    /* Fire button */
    .fire-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      border: none; font-family: var(--sans); transition: all 0.15s;
      margin-top: 6px;
    }
    .fire-btn.ready { background: var(--tg-green); color: #0a1f12; }
    .fire-btn.ready:active { transform: scale(0.98); opacity: 0.9; }
    .fire-btn.disabled { background: var(--tg-input); color: var(--tg-text3); cursor: not-allowed; }
    .fire-btn.fired { background: var(--tg-blue); color: white; }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--tg-text3); animation: typing 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-6px);opacity:1} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .animate-in { animation: slideIn 0.25s ease forwards; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--tg-surface2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-avatar">⚡</div>
  <div class="header-info">
    <div class="header-name">Radio Trader Bot</div>
    <div class="header-status" id="hstatus">
      <div class="online-dot"></div>
      <span id="hstatus-txt">conectado a Polymarket</span>
    </div>
  </div>
</div>

<!-- Chat -->
<div class="chat" id="chat">

  <!-- Welcome message -->
  <div class="msg bot animate-in">
    <div class="bubble">
      👋 Hola! Soy tu asistente de trading en Polymarket.<br><br>
      Pega la URL del partido que quieres tradear y te cargo todos los mercados disponibles.
    </div>
    <div class="msg-time" id="welcome-time"></div>
  </div>

</div>

<!-- Input area -->
<div class="input-area">
  <div class="input-row">
    <input type="text" class="input-field" id="urlinput"
      placeholder="polymarket.com/sports/es2/es2-..." autocomplete="off" autocorrect="off" autocapitalize="off" />
    <button class="send-btn" onclick="loadEvent()">➤</button>
  </div>
  <div class="amount-row">
    <span class="amount-label">Apuesta $</span>
    <input type="number" class="amount-field" id="amountinput" value="50" min="1" oninput="compute()" />
    <div class="qa-btn" onclick="setAmount(10)">10</div>
    <div class="qa-btn" onclick="setAmount(25)">25</div>
    <div class="qa-btn" onclick="setAmount(50)">50</div>
    <div class="qa-btn" onclick="setAmount(100)">100</div>
    <div class="qa-btn" onclick="setAmount(200)">200</div>
  </div>
</div>

<script>
const BOT = "https://worker-production-b5c8.up.railway.app";
const S = {
  event: null, team: null,
  price: null, bid: null, spread: null,
  model: null, edge: null,
  fired: false, token: null,
  home: '', away: '', bookTimer: null
};

const DELTAS = {
  goal:            {'mid':0.15},
  red_card:        {'mid':-0.09},
  yellow_red_card: {'mid':-0.07},
  penalty_awarded: {'mid':0.06},
  injury_stop:     {'mid':-0.03},
  var:             {'mid':0},
};

const EVENT_LABELS = {
  goal: { icon: '⚽', label: 'Gol', color: 'selected-green' },
  red_card: { icon: '🟥', label: 'Roja', color: 'selected-red' },
  yellow_red_card: { icon: '🟨🟥', label: '2ª amarilla', color: 'selected-red' },
  penalty_awarded: { icon: '🎯', label: 'Penalty', color: 'selected-orange' },
  injury_stop: { icon: '🏥', label: 'Lesión', color: 'selected-orange' },
  var: { icon: '📺', label: 'VAR', color: 'selected-blue' },
};

let allMarkets = [];
let activeTab = '';
let signalMsgId = null;
let fireBtnEl = null;

function now() {
  return new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
}

document.getElementById('welcome-time').textContent = now();

function addMsg(html, type='bot', id=null) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = `msg ${type} animate-in`;
  if (id) wrap.id = id;
  wrap.innerHTML = `<div class="bubble">${html}</div><div class="msg-time${type==='user'?' style="text-align:right"':''}">${now()}</div>`;
  chat.appendChild(wrap);
  setTimeout(() => wrap.scrollIntoView({behavior:'smooth',block:'end'}), 50);
  return wrap;
}

function addCard(headerHtml, bodyHtml, id=null) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'card-bubble animate-in';
  if (id) wrap.id = id;
  wrap.innerHTML = `<div class="card-header">${headerHtml}</div><div class="card-body">${bodyHtml}</div>`;
  chat.appendChild(wrap);
  setTimeout(() => wrap.scrollIntoView({behavior:'smooth',block:'end'}), 50);
  return wrap;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'msg bot animate-in';
  el.id = 'typing-indicator';
  el.innerHTML = `<div class="bubble"><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  chat.appendChild(el);
  el.scrollIntoView({behavior:'smooth',block:'end'});
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function setStatus(txt, online=true) {
  document.getElementById('hstatus-txt').textContent = txt;
  document.getElementById('hstatus').className = 'header-status' + (online ? '' : ' offline');
}

function getAmount() { return parseFloat(document.getElementById('amountinput').value) || 50; }
function setAmount(v) { document.getElementById('amountinput').value = v; compute(); }

function marketType(q) {
  q = (q||'').toLowerCase();
  if (q.includes('o/u') || q.includes('over') || q.includes('under') || q.includes('total')) return 'Totales';
  if (q.includes('spread') || q.includes('-1.5') || q.includes('-2.5') || q.includes('+1.5') || q.includes('+2.5')) return 'Spread';
  if (q.includes('both teams') || q.includes('btts')) return 'BTTS';
  if (q.includes('exact score')) return 'Exacto';
  if (q.includes('draw') || q.includes('empate')) return 'Moneyline';
  if (q.includes('win')) return 'Moneyline';
  return 'Otros';
}

function extractSlug(url) {
  const parts = url.trim().replace(/\/$/, '').split('/');
  return parts[parts.length - 1] || '';
}

async function loadEvent() {
  const url = document.getElementById('urlinput').value.trim();
  if (!url) return;
  const slug = extractSlug(url);
  if (!slug) return;

  // User message
  addMsg(url, 'user');
  document.getElementById('urlinput').value = '';

  showTyping();
  setStatus('cargando partido...', true);

  try {
    const res = await fetch(`${BOT}/event?slug=${encodeURIComponent(slug)}`);
    const data = await res.json();
    removeTyping();

    if (data.error) {
      addMsg(`❌ No encontré el partido: <b>${data.error}</b>`, 'bot');
      setStatus('error', false);
      return;
    }

    allMarkets = data.markets || [];
    const eventName = data.event || slug;

    // Extract teams
    const parts = eventName.split(/\s+vs\.?\s+/i);
    if (parts.length >= 2) {
      S.home = parts[0].trim().split(' ').slice(-2).join(' ');
      S.away = parts[1].trim().split(' ').slice(0,2).join(' ');
    }

    // Group by type
    const types = [...new Set(allMarkets.map(m => marketType(m.question)))];
    activeTab = types[0] || 'Moneyline';

    // Build tabs HTML
    const tabsHtml = `<div class="tabs" id="tabs-el">${types.map(t =>
      `<div class="tab${t===activeTab?' active':''}" onclick="switchTab('${t}')">${t}</div>`
    ).join('')}</div><div id="mlist-container"></div>`;

    const headerHtml = `
      <div class="card-title">🏟 ${eventName}</div>
      <div class="card-sub">${allMarkets.length} mercados disponibles</div>`;

    const cardEl = addCard(headerHtml, tabsHtml);
    renderMarkets(cardEl);

    setStatus('conectado · actualización cada 1s', true);

  } catch(e) {
    removeTyping();
    addMsg(`❌ Error de conexión: ${e.message}`, 'bot');
    setStatus('sin conexión', false);
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.textContent === tab);
  });
  renderMarkets();
}

function renderMarkets(cardEl) {
  const container = document.getElementById('mlist-container');
  if (!container) return;
  const filtered = allMarkets.filter(m => marketType(m.question) === activeTab);
  container.innerHTML = filtered.map((m, i) => {
    const vol = m.volume ? '<span style="color:var(--tg-blue-light)">$'+parseFloat(m.volume).toLocaleString('en',{maximumFractionDigits:0})+'</span>' : '';
    return `<div class="market-item" id="mitem-${i}" onclick="selectMarket(${i}, this)">
      <div class="market-q">${m.question}</div>
      ${vol ? `<div class="market-vol">Vol: ${vol}</div>` : ''}
    </div>`;
  }).join('');

  // Auto-select highest volume
  const byVol = [...filtered].sort((a,b) => parseFloat(b.volume||0)-parseFloat(a.volume||0));
  if (byVol.length) {
    const idx = filtered.indexOf(byVol[0]);
    const el = document.getElementById(`mitem-${idx}`);
    if (el) selectMarket(idx, el);
  }
}

function selectMarket(idx, el) {
  document.querySelectorAll('.market-item').forEach(x => x.classList.remove('selected'));
  if (el) el.classList.add('selected');

  const filtered = allMarkets.filter(m => marketType(m.question) === activeTab);
  const m = filtered[idx];
  if (!m) return;

  const tokens = Array.isArray(m.token_ids) ? m.token_ids : [];
  S.token = tokens[0] || null;

  if (S.bookTimer) clearInterval(S.bookTimer);
  fetchBook();
  S.bookTimer = setInterval(fetchBook, 1000);

  // Show event selection message if not shown
  if (!document.getElementById('event-selector')) {
    showEventSelector(m.question);
  }
}

function showEventSelector(mktName) {
  const chat = document.getElementById('chat');

  // Price card
  const priceCardEl = document.createElement('div');
  priceCardEl.className = 'card-bubble animate-in';
  priceCardEl.id = 'price-card';
  priceCardEl.innerHTML = `
    <div class="card-header">
      <div class="card-title">📊 Precio en vivo</div>
      <div class="card-sub" id="price-mkt-name" style="font-size:10px;opacity:0.7">${mktName.slice(0,50)}</div>
    </div>
    <div class="card-body">
      <div class="price-display">
        <div class="price-main" id="price-yes">—</div>
        <div class="price-label">YES</div>
      </div>
      <div class="price-row">
        <div class="price-chip"><div class="price-chip-label">BID</div><div class="price-chip-val" id="price-bid">—</div></div>
        <div class="price-chip"><div class="price-chip-label">ASK</div><div class="price-chip-val" id="price-ask">—</div></div>
        <div class="price-chip"><div class="price-chip-label">SPREAD</div><div class="price-chip-val" id="price-spread">—</div></div>
      </div>
    </div>`;
  chat.appendChild(priceCardEl);

  // Event selector
  const evEl = document.createElement('div');
  evEl.className = 'card-bubble animate-in';
  evEl.id = 'event-selector';
  evEl.innerHTML = `
    <div class="card-header">
      <div class="card-title">⚡ ¿Qué ocurrió?</div>
      <div class="card-sub">Detecta el evento en tiempo real</div>
    </div>
    <div class="card-body">
      <div class="inline-kb">
        <div class="inline-row">
          <div class="inline-btn" id="ebtn-goal" onclick="selEvent('goal')"><span class="btn-icon">⚽</span><span class="btn-text">Gol</span></div>
          <div class="inline-btn" id="ebtn-red_card" onclick="selEvent('red_card')"><span class="btn-icon">🟥</span><span class="btn-text">Tarjeta roja</span></div>
          <div class="inline-btn" id="ebtn-yellow_red_card" onclick="selEvent('yellow_red_card')"><span class="btn-icon">🟨🟥</span><span class="btn-text">2ª amarilla</span></div>
        </div>
        <div class="inline-row">
          <div class="inline-btn" id="ebtn-penalty_awarded" onclick="selEvent('penalty_awarded')"><span class="btn-icon">🎯</span><span class="btn-text">Penalty</span></div>
          <div class="inline-btn" id="ebtn-injury_stop" onclick="selEvent('injury_stop')"><span class="btn-icon">🏥</span><span class="btn-text">Lesión clave</span></div>
          <div class="inline-btn" id="ebtn-var" onclick="selEvent('var')"><span class="btn-icon">📺</span><span class="btn-text">VAR</span></div>
        </div>
      </div>
    </div>`;
  chat.appendChild(evEl);

  // Team selector
  const teamEl = document.createElement('div');
  teamEl.className = 'card-bubble animate-in';
  teamEl.id = 'team-selector';
  teamEl.innerHTML = `
    <div class="card-header">
      <div class="card-title">🏃 ¿Qué equipo?</div>
    </div>
    <div class="card-body">
      <div class="inline-row">
        <div class="inline-btn" id="tbtn-home" onclick="selTeam('home')">
          <span class="btn-icon">🏠</span>
          <span class="btn-text" id="tname-home">${S.home || 'Local'}</span>
        </div>
        <div class="inline-btn" id="tbtn-away" onclick="selTeam('away')">
          <span class="btn-icon">✈️</span>
          <span class="btn-text" id="tname-away">${S.away || 'Visitante'}</span>
        </div>
      </div>
    </div>`;
  chat.appendChild(teamEl);

  // Signal card placeholder
  const sigEl = document.createElement('div');
  sigEl.className = 'signal-card animate-in';
  sigEl.id = 'signal-card';
  sigEl.innerHTML = buildSignalHTML();
  chat.appendChild(sigEl);

  setTimeout(() => sigEl.scrollIntoView({behavior:'smooth',block:'end'}), 100);
}

async function fetchBook() {
  if (!S.token) return;
  try {
    const res = await fetch(`${BOT}/orderbook?token_id=${S.token}`);
    const data = await res.json();
    S.price = data.best_ask;
    S.bid = data.best_bid;
    S.spread = data.spread;

    const pYes = document.getElementById('price-yes');
    const pBid = document.getElementById('price-bid');
    const pAsk = document.getElementById('price-ask');
    const pSpread = document.getElementById('price-spread');

    if (pYes) pYes.textContent = S.price ? (S.price*100).toFixed(1)+'¢' : '—';
    if (pBid) pBid.textContent = S.bid ? (S.bid*100).toFixed(1)+'¢' : '—';
    if (pAsk) pAsk.textContent = S.price ? (S.price*100).toFixed(1)+'¢' : '—';
    if (pSpread) pSpread.textContent = S.spread ? (S.spread*100).toFixed(1)+'¢' : '—';

    if (S.event && S.team) compute();
  } catch(e) {}
}

function selEvent(ev) {
  S.event = ev; S.fired = false;
  document.querySelectorAll('[id^="ebtn-"]').forEach(b => {
    const key = b.id.replace('ebtn-','');
    b.className = 'inline-btn' + (key === ev ? ' ' + (EVENT_LABELS[ev]?.color || '') : '');
  });
  compute();
}

function selTeam(t) {
  S.team = t;
  const hb = document.getElementById('tbtn-home');
  const ab = document.getElementById('tbtn-away');
  if (hb) hb.className = 'inline-btn' + (t==='home' ? ' selected-blue' : '');
  if (ab) ab.className = 'inline-btn' + (t==='away' ? ' selected-orange' : '');
  compute();
}

function compute() {
  if (!S.price || !S.event || !S.team) { updateSignalCard(); return; }
  let delta = (DELTAS[S.event]||{})['mid']||0;
  if (S.team === 'away') delta = -delta;
  S.model = Math.max(0.02, Math.min(0.98, S.price + delta));
  S.edge = S.model - S.price;
  updateSignalCard();
}

function buildSignalHTML() {
  const amount = getAmount();
  const hasEdge = S.edge !== null && S.edge > 0.02 && S.price !== null;
  const statusText = hasEdge ? '⚡ SEÑAL DETECTADA' : (S.event && S.team && S.price) ? '— SIN EDGE —' : '⏳ ESPERANDO EVENTO';
  const statusClass = hasEdge ? 'yes' : (S.event && S.team) ? 'no' : 'wait';
  const cardClass = hasEdge ? 'edge-yes' : (S.event && S.team && S.price) ? 'edge-no' : '';

  let profitHtml = '—', profitSub = '';
  let retHtml = '—', edgeHtml = '—', edgeSub = '', priceHtml = '—', modelHtml = '—';

  if (S.price !== null && amount > 0) {
    const shares = amount / S.price;
    const profit = shares - amount;
    profitHtml = `+$${profit.toFixed(2)}`;
    profitSub = `${shares.toFixed(1)} shares × $1`;
    retHtml = `$${shares.toFixed(2)}`;
  }
  if (S.edge !== null) {
    edgeHtml = (S.edge>0?'+':'') + (S.edge*100).toFixed(1) + '¢';
    edgeSub = S.edge > 0 ? 'mercado infravalorado' : 'sobrevalorado';
  }
  if (S.price !== null) priceHtml = (S.price*100).toFixed(1)+'¢';
  if (S.model !== null) modelHtml = (S.model*100).toFixed(1)+'¢';

  const btnClass = hasEdge && !S.fired ? 'ready' : S.fired ? 'fired' : 'disabled';
  const btnText = hasEdge && !S.fired
    ? `⚡ APOSTAR $${amount} → GANAR +$${S.price ? ((amount/S.price)-amount).toFixed(2) : '?'}`
    : S.fired ? '✓ ORDEN ENVIADA' : 'SELECCIONA EVENTO Y EQUIPO';

  return `
    <div class="signal-top" onclick="">
      <span class="signal-status ${statusClass}">${statusText}</span>
      <span style="font-size:11px;color:var(--tg-text3)">${now()}</span>
    </div>
    <div class="signal-grid">
      <div class="sig-box">
        <div class="sig-num ${S.edge!==null?(S.edge>0?'green':'red'):''}">${edgeHtml}</div>
        <div class="sig-lbl">edge detectado</div>
        <div class="sig-sub">${edgeSub}</div>
      </div>
      <div class="sig-box profit-box">
        <div class="sig-num green">${profitHtml}</div>
        <div class="sig-lbl">ganancia potencial</div>
        <div class="sig-sub">${profitSub}</div>
      </div>
    </div>
    <div class="payout-strip">
      <div class="payout-cell"><div class="payout-num">${priceHtml}</div><div class="payout-lbl">precio YES</div></div>
      <div class="payout-cell"><div class="payout-num">${modelHtml}</div><div class="payout-lbl">prob modelo</div></div>
      <div class="payout-cell"><div class="payout-num">${retHtml}</div><div class="payout-lbl">retorno total</div></div>
    </div>
    <div style="padding:10px 12px;">
      <button class="fire-btn ${btnClass}" onclick="fireOrder()">${btnText}</button>
    </div>`;
}

function updateSignalCard() {
  const card = document.getElementById('signal-card');
  if (!card) return;
  const hasEdge = S.edge !== null && S.edge > 0.02 && S.price !== null;
  card.className = `signal-card animate-in ${hasEdge ? 'edge-yes' : (S.event&&S.team&&S.price?'edge-no':'')}`;
  card.innerHTML = buildSignalHTML();
}

function fireOrder() {
  if (S.fired || !S.edge || S.edge <= 0.02 || !S.price) return;
  const amount = getAmount();
  const shares = (amount / S.price).toFixed(1);
  const profit = ((amount / S.price) - amount).toFixed(2);
  S.fired = true;
  updateSignalCard();

  addMsg(`
    ✅ <b>Orden registrada</b><br>
    💵 $${amount} → ${shares} shares YES @ ${(S.price*100).toFixed(1)}¢<br>
    📈 Ganancia potencial: <b>+$${profit}</b><br>
    <span style="color:var(--tg-text3);font-size:12px">DRY RUN — conecta wallet Polygon para órdenes reales</span>
  `, 'bot');

  setTimeout(() => {
    S.event=null; S.team=null; S.fired=false; S.edge=null; S.model=null;
    document.querySelectorAll('[id^="ebtn-"]').forEach(b => b.className='inline-btn');
    const hb=document.getElementById('tbtn-home'); if(hb) hb.className='inline-btn';
    const ab=document.getElementById('tbtn-away'); if(ab) ab.className='inline-btn';
    updateSignalCard();
  }, 5000);
}

document.getElementById('urlinput').addEventListener('keydown', e => { if(e.key==='Enter') loadEvent(); });
document.getElementById('amountinput').addEventListener('input', () => { compute(); });
</script>
</body>
</html>
