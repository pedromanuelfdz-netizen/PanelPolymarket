<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Polymarket Bot Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#17212b;--surface:#242f3d;--surface2:#1c2a35;
      --blue:#2b9af3;--blue2:#2b5278;--green:#4dca6e;
      --red:#f36d6d;--orange:#f0a644;--text:#ffffff;
      --text2:#aab8c2;--text3:#5a7385;--border:#1c2733;
      --input:#1c2a35;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:30px}

    /* ── Header ── */
    .header{background:var(--surface);padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
    .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#1a6fa8);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .hinfo{flex:1;min-width:0}
    .hname{font-size:14px;font-weight:600}
    .hstatus{font-size:11px;display:flex;align-items:center;gap:4px;margin-top:1px}
    .hdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .hdot.green{background:var(--green);animation:pulse 2s infinite}
    .hdot.red{background:var(--red)}
    .hdot.amber{background:var(--orange);animation:pulse 1s infinite}
    .htick{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0}
    .hbtn{background:var(--input);border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-size:11px;color:var(--text3);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:var(--sans)}
    .hbtn:active{background:var(--blue2);color:var(--text)}
    .hbtn.active-tab{background:var(--blue2);color:var(--text);border-color:var(--blue)}

    /* ── Main layout ── */
    .page{display:none;padding:10px;flex-direction:column;gap:10px}
    .page.visible{display:flex}

    /* ── Status bar ── */
    .status-bar{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden}
    .status-grid{display:grid;grid-template-columns:repeat(4,1fr)}
    .sc{padding:10px 6px;text-align:center;border-right:1px solid var(--border)}
    .sc:last-child{border-right:none}
    .sc-val{font-family:var(--mono);font-size:13px;font-weight:700}
    .sc-lbl{font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:0.3px}
    .sc-val.g{color:var(--green)}.sc-val.r{color:var(--red)}.sc-val.o{color:var(--orange)}.sc-val.w{color:var(--text)}

    /* ── Mode badge ── */
    .mode-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border)}
    .mode-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
    .mode-badge.test{background:#2d1f00;color:var(--orange);border:1px solid var(--orange)}
    .mode-badge.live{background:#0d2d0d;color:var(--green);border:1px solid var(--green)}
    .mode-badge.kill{background:#2d0d0d;color:var(--red);border:1px solid var(--red)}

    /* ── Section card ── */
    .card{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden}
    .card-head{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .card-title{font-size:12px;font-weight:600;color:var(--text2)}
    .card-badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:10px;background:var(--input);color:var(--text3)}
    .card-badge.g{background:#0d2d0d;color:var(--green)}
    .card-badge.o{background:#2d1f00;color:var(--orange)}

    /* ── Layer status ── */
    .layer-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border)}
    .layer-row:last-child{border-bottom:none}
    .layer-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .layer-dot.on{background:var(--green);animation:pulse 2s infinite}
    .layer-dot.off{background:var(--text3)}
    .layer-dot.safe{background:var(--orange)}
    .layer-name{font-size:12px;font-weight:600}
    .layer-sub{font-size:10px;color:var(--text3);margin-top:1px}
    .layer-opps{font-family:var(--mono);font-size:12px;color:var(--blue)}
    .layer-trades{font-family:var(--mono);font-size:11px;color:var(--text3)}

    /* ── Opportunity item ── */
    .opp-item{padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px}
    .opp-item:last-child{border-bottom:none}
    .opp-q{color:var(--text2);margin-bottom:4px;line-height:1.3}
    .opp-meta{display:flex;gap:10px;flex-wrap:wrap}
    .opp-chip{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:5px;background:var(--input)}
    .opp-chip.edge{color:var(--green);background:#0d2d0d}
    .opp-chip.score{color:var(--blue);background:#0d1f3d}
    .opp-chip.mom{color:var(--orange);background:#2d1f00}

    /* ── Trade row ── */
    .trade-row{display:grid;grid-template-columns:22px 1fr auto auto;gap:6px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px}
    .trade-row:last-child{border-bottom:none}
    .tl{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
    .tl.l1{background:#1a3d26;color:var(--green)}
    .tl.l2{background:#1a2d3d;color:var(--blue)}
    .tl.l3{background:#3d2d0d;color:var(--orange)}
    .tq{color:var(--text2);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tsub{font-size:9px;color:var(--text3);margin-top:1px}
    .tamt{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;text-align:right}
    .tpnl{font-family:var(--mono);font-size:12px;font-weight:700;flex-shrink:0;text-align:right}
    .tpnl.g{color:var(--green)}.tpnl.r{color:var(--red)}.tpnl.n{color:var(--text3)}.tpnl.e{color:var(--red)}

    /* ── PnL summary ── */
    .pnl-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border)}
    .pg{padding:10px 6px;text-align:center;border-right:1px solid var(--border)}
    .pg:last-child{border-right:none}
    .pg-val{font-family:var(--mono);font-size:15px;font-weight:700}
    .pg-val.g{color:var(--green)}.pg-val.r{color:var(--red)}.pg-val.w{color:var(--text)}.pg-val.o{color:var(--orange)}
    .pg-lbl{font-size:9px;color:var(--text3);margin-top:2px}

    /* ── Positions ── */
    .pos-item{padding:10px 12px;border-bottom:1px solid var(--border)}
    .pos-item:last-child{border-bottom:none}
    .pos-q{font-size:11px;color:var(--text2);margin-bottom:5px;line-height:1.3}
    .pos-row{display:flex;justify-content:space-between;margin-bottom:3px}
    .pos-label{font-size:10px;color:var(--text3)}
    .pos-val{font-size:11px;font-weight:600;font-family:var(--mono)}
    .pos-val.g{color:var(--green)}.pos-val.r{color:var(--red)}.pos-val.w{color:var(--text)}
    .sell-btn{width:100%;margin-top:7px;padding:8px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);background:var(--red);color:white;transition:opacity 0.15s}
    .sell-btn:active{opacity:0.8}
    .sell-btn.sold{background:var(--blue)}

    .empty{padding:14px;text-align:center;font-size:12px;color:var(--text3)}
    .refresh-note{padding:6px 12px;font-size:10px;color:var(--text3);text-align:right;border-top:1px solid var(--border)}

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
    @keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .ani{animation:in 0.2s ease forwards}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}
  </style>
</head>
<body>

<div class="header">
  <div class="avatar">⚡</div>
  <div class="hinfo">
    <div class="hname">Polymarket Bot</div>
    <div class="hstatus">
      <div class="hdot green" id="hdot"></div>
      <span style="color:var(--text3)" id="hstxt">conectando...</span>
    </div>
  </div>
  <div class="htick" id="htick"></div>
  <button class="hbtn active-tab" id="tab-dash" onclick="showTab('dash')">📊</button>
  <button class="hbtn" id="tab-trades" onclick="showTab('trades')">📈 PnL</button>
  <button class="hbtn" id="tab-pos" onclick="showTab('pos')">💼 Pos</button>
</div>

<!-- ══ DASHBOARD TAB ══════════════════════════════════════════════════ -->
<div class="page visible" id="page-dash">

  <!-- Status bar -->
  <div class="status-bar ani">
    <div class="mode-row">
      <div id="mode-badge" class="mode-badge test">⏳ Cargando...</div>
      <span id="last-update" style="font-size:10px;color:var(--text3)">—</span>
    </div>
    <div class="status-grid">
      <div class="sc"><div class="sc-val w" id="st-pairs">—</div><div class="sc-lbl">PARES</div></div>
      <div class="sc"><div class="sc-val w" id="st-prices">—</div><div class="sc-lbl">PRECIOS</div></div>
      <div class="sc"><div class="sc-val w" id="st-positions">—</div><div class="sc-lbl">POSICIONES</div></div>
      <div class="sc"><div class="sc-val w" id="st-trades">—</div><div class="sc-lbl">TRADES HOY</div></div>
    </div>
  </div>

  <!-- Capital -->
  <div class="card ani">
    <div class="card-head"><span class="card-title">💰 Capital hoy</span></div>
    <div class="pnl-grid">
      <div class="pg"><div class="pg-val w" id="cap-deployed">—</div><div class="pg-lbl">DESPLEGADO</div></div>
      <div class="pg"><div class="pg-val w" id="cap-pnl">—</div><div class="pg-lbl">PnL ESTIMADO</div></div>
      <div class="pg"><div class="pg-val w" id="cap-limit">—</div><div class="pg-lbl">LÍMITE DIARIO</div></div>
    </div>
  </div>

  <!-- 3 Layers -->
  <div class="card ani">
    <div class="card-head"><span class="card-title">🤖 Capas activas</span></div>
    <div id="layers-body">
      <div class="empty">Cargando...</div>
    </div>
  </div>

  <!-- Top opportunities -->
  <div class="card ani">
    <div class="card-head">
      <span class="card-title">🔍 Mejores oportunidades</span>
      <span class="card-badge" id="opp-count">—</span>
    </div>
    <div id="opps-body"><div class="empty">Cargando...</div></div>
  </div>

</div>

<!-- ══ TRADES / PnL TAB ══════════════════════════════════════════════ -->
<div class="page" id="page-trades">
  <div class="card ani">
    <div class="card-head">
      <span class="card-title">📈 Historial de operaciones</span>
      <span class="card-badge" id="trade-count">—</span>
    </div>
    <div id="trades-body"><div class="empty">Cargando...</div></div>
  </div>
</div>

<!-- ══ POSITIONS TAB ══════════════════════════════════════════════════ -->
<div class="page" id="page-pos">
  <div class="card ani">
    <div class="card-head">
      <span class="card-title">💼 Posiciones abiertas</span>
      <button class="hbtn" style="font-size:10px" onclick="loadPositions()">↻ Actualizar</button>
    </div>
    <div id="pos-body"><div class="empty">Cargando...</div></div>
  </div>
</div>

<script>
const BOT = 'https://worker-production-b5c8.up.railway.app';
let refreshTimer = null;
let currentTab = 'dash';

// ── Tab navigation ────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  ['dash','trades','pos'].forEach(t => {
    document.getElementById('page-'+t).classList.toggle('visible', t===tab);
    document.getElementById('tab-'+t).classList.toggle('active-tab', t===tab);
  });
  if(tab==='dash') refreshDashboard();
  if(tab==='trades') refreshTrades();
  if(tab==='pos') loadPositions();
}

// ── Clock ─────────────────────────────────────────────────────────────────
function startClock() {
  setInterval(() => {
    document.getElementById('htick').textContent =
      new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }, 1000);
}

function now() {
  return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function fmt(n) {
  if(!n&&n!==0) return '—';
  if(n>=1e6) return '$'+(n/1e6).toFixed(1)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(1)+'K';
  return '$'+n.toFixed(0);
}

// ── Status indicator ──────────────────────────────────────────────────────
function setStatus(txt, state='green') {
  document.getElementById('hstxt').textContent = txt;
  document.getElementById('hdot').className = 'hdot ' + state;
}

// ── Dashboard refresh ─────────────────────────────────────────────────────
async function refreshDashboard() {
  try {
    const [dash, log] = await Promise.all([
      fetch(`${BOT}/dashboard`, {cache:'no-store'}).then(r=>r.json()),
      fetch(`${BOT}/arb-log`,   {cache:'no-store'}).then(r=>r.json()),
    ]);

    setStatus('conectado', 'green');
    document.getElementById('last-update').textContent = 'actualizado '+now();

    const dryRun    = dash.dry_run;
    const safeMode  = dash.safe_mode;
    const kill      = dash.kill_switch;
    const cap       = dash.capital || {};
    const l1        = dash.layer1  || {};
    const l2        = dash.layer2  || {};
    const l3        = dash.layer3  || {};
    const filters   = dash.filters || {};

    // Mode badge
    const mb = document.getElementById('mode-badge');
    if(kill) {
      mb.className='mode-badge kill'; mb.textContent='🚨 KILL SWITCH';
    } else if(safeMode) {
      mb.className='mode-badge test'; mb.textContent='🛡️ SAFE MODE';
    } else if(dryRun) {
      mb.className='mode-badge test'; mb.textContent='🧪 TEST MODE (DRY RUN)';
    } else {
      mb.className='mode-badge live'; mb.textContent='🔴 LIVE — dinero real';
    }

    // Status grid
    const health = await fetch(`${BOT}/health`,{cache:'no-store'}).then(r=>r.json());
    document.getElementById('st-pairs').textContent    = health.market_pairs||'—';
    document.getElementById('st-prices').textContent   = health.cached_prices||'—';
    document.getElementById('st-positions').textContent= cap.open_positions+'/'+cap.max_positions;
    document.getElementById('st-trades').textContent   = cap.deployed_today?
      filters.hourly_trades||'0':'0';

    // Capital
    const pnl = dryRun ? (cap.estimated_pnl||0) : (cap.realized_pnl||0);
    const pnlClass = pnl>0?'g':pnl<0?'r':'w';
    document.getElementById('cap-deployed').textContent = '$'+(cap.deployed_today||0).toFixed(2);
    document.getElementById('cap-deployed').className   = 'pg-val w';
    document.getElementById('cap-pnl').textContent  = (pnl>=0?'+':'')+'$'+pnl.toFixed(3);
    document.getElementById('cap-pnl').className    = 'pg-val '+pnlClass;
    document.getElementById('cap-limit').textContent = '$'+(cap.daily_limit||0).toFixed(0);
    document.getElementById('cap-limit').className   = 'pg-val w';

    // Layers
    const layers = [
      {key:'L1', name:'Smart Arb YES+NO',  obj:l1, color:'l1', icon:'⚡', extra:`edge mín ${l1.min_edge_required||0}%`},
      {key:'L2', name:'Market Making',     obj:l2, color:'l2', icon:'📊', extra:`spread mín ${l2.min_spread||0}`},
      {key:'L3', name:'Momentum',          obj:l3, color:'l3', icon:'🚀', extra:`mom mín ${l3.momentum_threshold||0}%`},
    ];
    document.getElementById('layers-body').innerHTML = layers.map(({key,name,obj,color,icon,extra})=>`
      <div class="layer-row">
        <div class="layer-dot ${obj.active?(safeMode&&key!=='L1'?'safe':'on'):'off'}"></div>
        <div>
          <div class="layer-name">${icon} ${name}</div>
          <div class="layer-sub">${extra} · ${obj.trades_today||0} trades hoy</div>
        </div>
        <div class="layer-opps">${obj.opportunities||0} opps</div>
        <div class="layer-trades">${obj.avg_edge_pct?obj.avg_edge_pct+'%':''}</div>
      </div>`).join('');

    // Top opportunities (merge all layers)
    const allOpps = [
      ...(l1.top||[]).map(o=>({...o,_layer:'L1',_color:'edge'})),
      ...(l2.top||[]).map(o=>({...o,_layer:'L2',_color:'score'})),
      ...(l3.top||[]).map(o=>({...o,_layer:'L3',_color:'mom'})),
    ].sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,8);

    document.getElementById('opp-count').textContent = allOpps.length + ' top';
    document.getElementById('opps-body').innerHTML = allOpps.length===0
      ? '<div class="empty">Sin oportunidades activas ahora mismo</div>'
      : allOpps.map(o=>`
          <div class="opp-item">
            <div class="opp-q">[${o._layer}] ${o.question||'—'}</div>
            <div class="opp-meta">
              ${o.edge_pct?`<span class="opp-chip edge">edge ${o.edge_pct}%</span>`:''}
              ${o.spread?`<span class="opp-chip score">spread ${(o.spread*100).toFixed(1)}¢</span>`:''}
              ${o.momentum_pct?`<span class="opp-chip mom">mom ${o.momentum_pct>0?'+':''}${o.momentum_pct}%</span>`:''}
              <span class="opp-chip score">score ${o.score||0}</span>
              ${o.volume?`<span class="opp-chip">${fmt(o.volume)}</span>`:''}
            </div>
          </div>`).join('');

  } catch(e) {
    setStatus('sin conexión', 'red');
    console.error('Dashboard error:', e);
  }
}

// ── Trades / PnL ──────────────────────────────────────────────────────────
async function refreshTrades() {
  document.getElementById('trades-body').innerHTML = '<div class="empty">Cargando...</div>';
  try {
    const [log, dash] = await Promise.all([
      fetch(`${BOT}/arb-log`,   {cache:'no-store'}).then(r=>r.json()),
      fetch(`${BOT}/dashboard`, {cache:'no-store'}).then(r=>r.json()),
    ]);

    const trades  = log.log || [];
    const dryRun  = dash.dry_run;
    const cap     = dash.capital || {};

    // Totals
    let totalEst = 0;
    trades.forEach(t => { totalEst += (t.edge_pct||0)*( t.amount||0)/100; });

    const pnlVal  = dryRun ? (cap.estimated_pnl||0) : (cap.realized_pnl||0);
    const pnlCls  = pnlVal>0?'g':pnlVal<0?'r':'w';
    const modeTxt = dryRun ? '🧪 TEST' : '🔴 LIVE';

    document.getElementById('trade-count').textContent = trades.length+' operaciones';

    document.getElementById('trades-body').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border)">
        <span style="font-size:11px;font-weight:700;color:var(--orange)">${modeTxt}</span>
        <span style="font-family:var(--mono);font-size:12px;color:var(--text3)">desplegado hoy: <b style="color:var(--text)">$${(cap.deployed_today||0).toFixed(2)}</b></span>
      </div>
      <div class="pnl-grid" style="border-bottom:1px solid var(--border)">
        <div class="pg">
          <div class="pg-val ${pnlCls}">${pnlVal>=0?'+':''}$${pnlVal.toFixed(3)}</div>
          <div class="pg-lbl">${dryRun?'PnL ESTIMADO':'PnL REALIZADO'}</div>
        </div>
        <div class="pg">
          <div class="pg-val o">~+$${totalEst.toFixed(3)}</div>
          <div class="pg-lbl">EDGE ACUMULADO</div>
        </div>
        <div class="pg">
          <div class="pg-val w">${trades.length}</div>
          <div class="pg-lbl">TOTAL TRADES</div>
        </div>
      </div>
      ${trades.length===0
        ? '<div class="empty">No hay operaciones registradas aún</div>'
        : trades.map(t => {
            const layer = t.layer||1;
            const lc    = ['l1','l2','l3'][layer-1]||'l1';
            const ll    = ['L1','L2','L3'][layer-1]||'L?';
            const est   = ((t.edge_pct||0)*(t.amount||0)/100);
            const pnlStr = t.status==='dry_run'
              ? `~$${est.toFixed(3)}`
              : t.status==='executed'
                ? `${t.edge_pct>=0?'+':''}$${est.toFixed(3)}`
                : t.status==='error' ? '❌ error'
                : t.status==='slippage_abort' ? '⚠️ slip'
                : '–';
            const pCls  = t.status==='dry_run'?'n':t.status==='error'||t.status==='slippage_abort'?'e':t.edge_pct>0?'g':'r';
            const side  = t.side==='buy'?'▲':t.side==='sell'?'▼':'↔';
            const ts    = (t.ts||'').substring(11,16);
            const statusDot = t.status==='dry_run'?'🧪':t.status==='executed'?'✅':t.status==='error'?'❌':'⚠️';
            return `<div class="trade-row">
              <div class="tl ${lc}">${ll}</div>
              <div>
                <div class="tq">${side} ${t.question||'—'}</div>
                <div class="tsub">${statusDot} ${ts} · $${(t.price||0).toFixed(3)} · score ${t.score||0}</div>
              </div>
              <div class="tamt">$${(t.amount||0).toFixed(2)}</div>
              <div class="tpnl ${pCls}">${pnlStr}</div>
            </div>`;
          }).join('')
      }
      <div class="refresh-note">actualizado ${now()}</div>`;

  } catch(e) {
    document.getElementById('trades-body').innerHTML = `<div class="empty">❌ Error: ${e.message}</div>`;
  }
}

// ── Positions ─────────────────────────────────────────────────────────────
async function loadPositions() {
  document.getElementById('pos-body').innerHTML = '<div class="empty">Cargando...</div>';
  try {
    const data = await fetch(`${BOT}/positions`,{cache:'no-store'}).then(r=>r.json());
    if(data.error) { document.getElementById('pos-body').innerHTML=`<div class="empty">❌ ${data.error}</div>`; return; }

    const positions = data.positions||[];
    const totalVal  = data.total_value||0;

    document.getElementById('pos-body').innerHTML = positions.length===0
      ? '<div class="empty">No hay posiciones abiertas</div>'
      : `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border)">
           <span style="font-size:11px;color:var(--text3)">${positions.length} posiciones abiertas</span>
           <span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)">$${totalVal.toFixed(2)} total</span>
         </div>`
        + positions.map((p,i)=>{
            const pnl  = p.unrealized_pnl;
            const pCls = pnl!=null?(pnl>=0?'g':'r'):'w';
            const pStr = pnl!=null?(pnl>=0?'+':'')+'$'+pnl.toFixed(3):'—';
            const mid  = p.midpoint?(p.midpoint*100).toFixed(1)+'¢':'—';
            const val  = p.current_value?'$'+p.current_value.toFixed(2):'—';
            const label= p.outcome||p.market||(p.token_id||'').slice(0,16)+'...';
            return `<div class="pos-item">
              <div class="pos-q">${label}</div>
              <div class="pos-row"><span class="pos-label">Shares</span><span class="pos-val w">${parseFloat(p.size||0).toFixed(2)}</span></div>
              <div class="pos-row"><span class="pos-label">Midpoint</span><span class="pos-val w">${mid}</span></div>
              <div class="pos-row"><span class="pos-label">Valor actual</span><span class="pos-val g">${val}</span></div>
              <div class="pos-row"><span class="pos-label">PnL</span><span class="pos-val ${pCls}">${pStr}</span></div>
              <button class="sell-btn" id="sell-${i}" onclick="sellPos('${p.token_id}',${p.size||0},${i})">
                💸 Vender ${parseFloat(p.size||0).toFixed(2)} shares → ${val}
              </button>
            </div>`;
          }).join('')
        + `<div class="refresh-note">actualizado ${now()}</div>`;

  } catch(e) {
    document.getElementById('pos-body').innerHTML = `<div class="empty">❌ ${e.message}</div>`;
  }
}

async function sellPos(tokenId, size, idx) {
  const btn = document.getElementById('sell-'+idx);
  if(btn){ btn.disabled=true; btn.textContent='⏳ Vendiendo...'; }
  try {
    const res  = await fetch(`${BOT}/sell`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token_id:tokenId,size})});
    const data = await res.json();
    if(data.status==='ok'||data.status==='dry_run'){
      if(btn){ btn.className='sell-btn sold'; btn.textContent='✅ Vendido'; }
      setTimeout(loadPositions, 2000);
    } else {
      if(btn){ btn.disabled=false; btn.textContent='❌ Error — reintentar'; }
    }
  } catch(e) {
    if(btn){ btn.disabled=false; btn.textContent='❌ Sin conexión'; }
  }
}

// ── Auto-refresh ──────────────────────────────────────────────────────────
function startAutoRefresh() {
  // Initial load
  refreshDashboard();
  // Auto refresh every 30s
  setInterval(() => {
    if(currentTab==='dash')   refreshDashboard();
    if(currentTab==='trades') refreshTrades();
    if(currentTab==='pos')    loadPositions();
  }, 30000);
}

// ── Init ──────────────────────────────────────────────────────────────────
startClock();
startAutoRefresh();
</script>
