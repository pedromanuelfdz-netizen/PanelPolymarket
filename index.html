<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Radio Trader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0a; color: #ccc; font-family: 'Courier New', monospace; }
    .app { max-width: 480px; margin: 0 auto; padding: 12px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #1a1a1a; }
    .app-title { font-size: 10px; letter-spacing: 3px; color: #444; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .dot.green { background: #22c55e; animation: pulse 2s infinite; }
    .dot.amber { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.red { background: #dc2626; }
    .status-txt { font-size: 11px; color: #555; }
    .section-label { font-size: 9px; letter-spacing: 2px; color: #444; margin-bottom: 8px; margin-top: 12px; }
    .divider { border: none; border-top: 1px solid #1a1a1a; margin: 10px 0; }

    .url-box { margin-bottom: 10px; }
    .url-box input { width: 100%; font-family: 'Courier New', monospace; font-size: 12px; padding: 10px 12px; border-radius: 8px; border: 1px solid #222; background: #111; color: #ccc; outline: none; margin-bottom: 6px; }
    .url-box input:focus { border-color: #3b82f6; }
    .url-box input::placeholder { color: #333; font-size: 11px; }
    .btn-load { width: 100%; background: #3b82f6; color: white; border: none; border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace; font-size: 12px; cursor: pointer; letter-spacing: 1px; }
    .btn-load:active { opacity: 0.8; }

    .event-info { background: #111; border: 1px solid #1e1e1e; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; display: none; }
    .event-info.visible { display: block; }
    .event-name { font-size: 13px; font-weight: bold; color: #ccc; margin-bottom: 8px; }
    .market-list { display: flex; flex-direction: column; gap: 5px; }
    .market-item { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 6px; padding: 8px 10px; cursor: pointer; }
    .market-item:active { opacity: 0.7; }
    .market-item.selected { border: 1.5px solid #3b82f6; background: #0d1929; }
    .market-q { font-size: 11px; color: #aaa; line-height: 1.3; }
    .market-vol { font-size: 10px; color: #444; margin-top: 2px; }

    .price-bar { background: #111; border: 1px solid #1e1e1e; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: none; }
    .price-bar.visible { display: block; }
    .price-row { display: flex; justify-content: space-between; align-items: center; }
    .price-big { font-size: 26px; font-weight: bold; color: #22c55e; }
    .price-label { font-size: 9px; color: #444; margin-bottom: 2px; }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 3px; animation: pulse 1.5s infinite; }
    .spread-txt { font-size: 11px; color: #666; }

    .event-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
    .ev-btn { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px 6px; text-align: center; cursor: pointer; user-select: none; }
    .ev-btn:active { transform: scale(0.95); }
    .ev-btn.active { border: 2px solid #dc2626; background: #1a0808; }
    .ev-icon { font-size: 18px; margin-bottom: 3px; }
    .ev-label { font-size: 10px; color: #666; }

    .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .team-btn { background: #111; border: 1px solid #222; border-radius: 8px; padding: 14px 8px; text-align: center; cursor: pointer; user-select: none; }
    .team-btn:active { transform: scale(0.97); }
    .team-btn.home-sel { border: 2px solid #3b82f6; background: #0d1929; }
    .team-btn.away-sel { border: 2px solid #f59e0b; background: #1a1200; }
    .team-side { font-size: 9px; color: #444; margin-bottom: 3px; }
    .team-name { font-size: 12px; font-weight: bold; color: #aaa; }

    .minute-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .minute-row input[type=range] { flex: 1; accent-color: #3b82f6; }
    .minute-val { font-size: 18px; font-weight: bold; color: #ccc; min-width: 40px; text-align: right; }

    .signal-card { border-radius: 8px; border: 1px solid #1e1e1e; padding: 12px; margin-bottom: 10px; background: #0d0d0d; }
    .signal-card.has-edge { border-color: #22c55e; background: #071a0e; }
    .signal-card.no-edge { border-color: #dc2626; background: #1a0808; }
    .signal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .sig-item { text-align: center; }
    .sig-val { font-size: 16px; font-weight: bold; color: #ccc; }
    .sig-val.pos { color: #22c55e; }
    .sig-val.neg { color: #dc2626; }
    .sig-lbl { font-size: 9px; color: #444; margin-top: 2px; }

    .fire-btn { width: 100%; padding: 18px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; cursor: pointer; border: none; margin-bottom: 10px; }
    .fire-btn.ready { background: #16a34a; color: white; }
    .fire-btn.ready:active { background: #15803d; transform: scale(0.98); }
    .fire-btn.disabled { background: #111; color: #333; border: 1px solid #1e1e1e; cursor: not-allowed; }
    .fire-btn.fired { background: #1e40af; color: white; }

    .log { max-height: 90px; overflow-y: auto; border-top: 1px solid #1a1a1a; padding-top: 8px; }
    .log-line { font-size: 10px; color: #333; padding: 2px 0; display: flex; gap: 6px; }
    .log-line.ok .msg { color: #16a34a; }
    .log-line.warn .msg { color: #d97706; }
    .log-line.err .msg { color: #dc2626; }
    .log-time { min-width: 55px; }
    .msg { color: #444; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="app-title">RADIO TRADER — POLYMARKET</span>
    <span><span class="dot green" id="sdot"></span><span class="status-txt" id="stxt">listo</span></span>
  </div>

  <div class="section-label">PEGA LA URL DEL PARTIDO DE POLYMARKET</div>
  <div class="url-box">
    <input type="text" id="urlinput" placeholder="https://polymarket.com/sports/es2/es2-rso-rrc-2026-04-17" autocomplete="off" autocorrect="off" autocapitalize="off" />
    <button class="btn-load" onclick="loadEvent()">CARGAR PARTIDO</button>
  </div>

  <div class="event-info" id="eventinfo">
    <div class="event-name" id="eventname">—</div>
    <div class="section-label" style="margin-top:0;margin-bottom:6px;">SELECCIONA EL MERCADO</div>
    <div class="market-list" id="mlist"></div>
  </div>

  <div class="price-bar" id="pricebar">
    <div class="price-row">
      <div>
        <div class="price-label"><span class="live-dot"></span>PRECIO YES</div>
        <div class="price-big" id="pbig">—</div>
      </div>
      <div style="text-align:right;">
        <div class="price-label">SPREAD</div>
        <div class="spread-txt" id="pspread">—</div>
        <div class="price-label" style="margin-top:4px;">MERCADO</div>
        <div style="font-size:10px;color:#444;max-width:130px;text-align:right;line-height:1.3;" id="pmkt">—</div>
      </div>
    </div>
  </div>

  <hr class="divider">
  <div class="section-label">EVENTO DETECTADO</div>
  <div class="event-grid">
    <div class="ev-btn" id="ebtn-goal" onclick="selEvent('goal')"><div class="ev-icon">⚽</div><div class="ev-label">Gol</div></div>
    <div class="ev-btn" id="ebtn-red_card" onclick="selEvent('red_card')"><div class="ev-icon">🟥</div><div class="ev-label">Roja</div></div>
    <div class="ev-btn" id="ebtn-yellow_red_card" onclick="selEvent('yellow_red_card')"><div class="ev-icon">🟨🟥</div><div class="ev-label">2ª amarilla</div></div>
    <div class="ev-btn" id="ebtn-penalty_awarded" onclick="selEvent('penalty_awarded')"><div class="ev-icon">🎯</div><div class="ev-label">Penalty</div></div>
    <div class="ev-btn" id="ebtn-injury_stop" onclick="selEvent('injury_stop')"><div class="ev-icon">🏥</div><div class="ev-label">Lesión</div></div>
    <div class="ev-btn" id="ebtn-var" onclick="selEvent('var')"><div class="ev-icon">📺</div><div class="ev-label">VAR</div></div>
  </div>

  <div class="section-label">¿QUIÉN?</div>
  <div class="team-grid">
    <div class="team-btn" id="tbtn-home" onclick="selTeam('home')"><div class="team-side">LOCAL</div><div class="team-name" id="tname-home">—</div></div>
    <div class="team-btn" id="tbtn-away" onclick="selTeam('away')"><div class="team-side">VISITANTE</div><div class="team-name" id="tname-away">—</div></div>
  </div>

  <div class="section-label">MINUTO</div>
  <div class="minute-row">
    <input type="range" min="1" max="95" value="45" id="mslider" oninput="selMinute(this.value)" />
    <div class="minute-val" id="mval">45'</div>
  </div>

  <div class="signal-card" id="sigcard">
    <div class="section-label" id="siglabel" style="margin-top:0;margin-bottom:8px;">ESPERANDO DATOS</div>
    <div class="signal-grid">
      <div class="sig-item"><div class="sig-val" id="sv-price">—</div><div class="sig-lbl">precio</div></div>
      <div class="sig-item"><div class="sig-val" id="sv-model">—</div><div class="sig-lbl">modelo</div></div>
      <div class="sig-item"><div class="sig-val" id="sv-edge">—</div><div class="sig-lbl">edge</div></div>
      <div class="sig-item"><div class="sig-val" id="sv-size">—</div><div class="sig-lbl">tamaño</div></div>
    </div>
  </div>

  <button class="fire-btn disabled" id="fbtn" onclick="fireOrder()">DISPARAR ORDEN</button>
  <div class="log" id="logbox"></div>
</div>

<script>
const BOT = "https://worker-production-b5c8.up.railway.app";
const S = { event:null, team:null, minute:45, price:null, model:null, edge:null, size:0, fired:false, token:null, home:'', away:'', bookTimer:null };

const DELTAS = {
  goal:            {'0-45':0.18,'45-70':0.15,'70-85':0.12,'85-95':0.08},
  red_card:        {'0-45':-0.12,'45-70':-0.10,'70-85':-0.07,'85-95':-0.04},
  yellow_red_card: {'0-45':-0.10,'45-70':-0.09,'70-85':-0.06,'85-95':-0.03},
  penalty_awarded: {'0-45':0.06,'45-70':0.06,'70-85':0.06,'85-95':0.06},
  injury_stop:     {'0-45':-0.04,'45-70':-0.04,'70-85':-0.03,'85-95':-0.02},
  var:             {'0-45':0,'45-70':0,'70-85':0,'85-95':0},
};

function bucket(m) { if(m<45)return'0-45'; if(m<70)return'45-70'; if(m<85)return'70-85'; return'85-95'; }

function addLog(msg, type) {
  const box = document.getElementById('logbox');
  const t = new Date().toTimeString().slice(0,8);
  const el = document.createElement('div');
  el.className = 'log-line '+(type||'');
  el.innerHTML = `<span class="log-time">${t}</span><span class="msg">${msg}</span>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function setStatus(txt, cls) {
  document.getElementById('stxt').textContent = txt;
  document.getElementById('sdot').className = 'dot '+cls;
}

function extractSlug(url) {
  const parts = url.trim().replace(/\/$/, '').split('/');
  return parts[parts.length - 1] || '';
}

async function loadEvent() {
  const url = document.getElementById('urlinput').value.trim();
  if (!url) return;
  const slug = extractSlug(url);
  if (!slug) { addLog('URL no válida', 'err'); return; }
  setStatus('cargando...', 'amber');
  addLog('Cargando: ' + slug, '');
  try {
    const res = await fetch(`${BOT}/event?slug=${encodeURIComponent(slug)}`);
    const data = await res.json();
    if (data.error) { addLog('Error: ' + data.error, 'err'); setStatus('error', 'red'); return; }
    document.getElementById('eventname').textContent = data.event || slug;
    document.getElementById('eventinfo').classList.add('visible');
    const parts = (data.event || '').split(/\s+vs\.?\s+/i);
    if (parts.length >= 2) {
      S.home = parts[0].trim().split(' ').slice(-1)[0];
      S.away = parts[1].trim().split(' ')[0];
    }
    document.getElementById('tname-home').textContent = S.home || 'Local';
    document.getElementById('tname-away').textContent = S.away || 'Visitante';
    const mlist = document.getElementById('mlist');
    mlist.innerHTML = '';
    (data.markets || []).forEach(m => {
      const el = document.createElement('div');
      el.className = 'market-item';
      const vol = m.volume ? '$'+parseFloat(m.volume).toLocaleString('en',{maximumFractionDigits:0}) : '';
      el.innerHTML = `<div class="market-q">${m.question}</div>${vol?'<div class="market-vol">Vol: '+vol+'</div>':''}`;
      el.onclick = () => selectMarket(m, el);
      mlist.appendChild(el);
    });
    setStatus('conectado', 'green');
    addLog(`${data.markets.length} mercados cargados`, 'ok');
    const byVol = [...(data.markets||[])].sort((a,b) => parseFloat(b.volume||0)-parseFloat(a.volume||0));
    if (byVol.length) {
      const idx = data.markets.indexOf(byVol[0]);
      const first = mlist.children[idx];
      if (first) selectMarket(byVol[0], first);
    }
  } catch(e) {
    addLog('Error: ' + e.message, 'err');
    setStatus('error', 'red');
  }
}

function selectMarket(m, el) {
  document.querySelectorAll('.market-item').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  const tokens = Array.isArray(m.token_ids) ? m.token_ids : [];
  S.token = tokens[0] || null;
  document.getElementById('pmkt').textContent = (m.question||'').slice(0,45);
  document.getElementById('pricebar').classList.add('visible');
  if (S.bookTimer) clearInterval(S.bookTimer);
  fetchBook();
  S.bookTimer = setInterval(fetchBook, 3000);
  addLog('Mercado: ' + (m.question||'').slice(0,40), 'ok');
}

async function fetchBook() {
  if (!S.token) return;
  try {
    const res = await fetch(`${BOT}/orderbook?token_id=${S.token}`);
    const data = await res.json();
    S.price = data.best_ask;
    document.getElementById('pbig').textContent = S.price ? (S.price*100).toFixed(1)+'¢' : '—';
    document.getElementById('pspread').textContent = data.spread ? (data.spread*100).toFixed(1)+'¢' : '—';
    if (S.event && S.team) compute();
  } catch(e) {}
}

function selEvent(ev) {
  S.event = ev; S.fired = false;
  document.querySelectorAll('.ev-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ebtn-'+ev).classList.add('active');
  addLog(ev.replace(/_/g,' ') + ' min ' + S.minute + "'", 'warn');
  compute();
}

function selTeam(t) {
  S.team = t;
  document.getElementById('tbtn-home').className = 'team-btn'+(t==='home'?' home-sel':'');
  document.getElementById('tbtn-away').className = 'team-btn'+(t==='away'?' away-sel':'');
  compute();
}

function selMinute(v) {
  S.minute = parseInt(v);
  document.getElementById('mval').textContent = v+"'";
  if (S.event && S.team) compute();
}

function compute() {
  if (!S.price || !S.event || !S.team) return;
  const b = bucket(S.minute);
  let delta = (DELTAS[S.event]||{})[b]||0;
  if (S.team === 'away') delta = -delta;
  S.model = Math.max(0.02, Math.min(0.98, S.price + delta));
  S.edge = S.model - S.price;
  if (S.edge > 0.03) {
    const odds = (1/S.price)-1;
    const kelly = ((S.model*odds-(1-S.model))/odds)*0.1;
    S.size = Math.min(50, Math.max(0, +(500*kelly).toFixed(2)));
  } else { S.size = 0; }
  renderSignal();
}

function renderSignal() {
  const hasEdge = S.edge !== null && S.edge > 0.03 && S.size > 1;
  const card = document.getElementById('sigcard');
  card.className = 'signal-card'+(hasEdge?' has-edge':S.edge!==null?' no-edge':'');
  document.getElementById('siglabel').textContent = hasEdge ? 'SEÑAL DETECTADA ⚡' : S.edge!==null ? 'EDGE INSUFICIENTE' : 'ESPERANDO DATOS';
  document.getElementById('sv-price').textContent = S.price!==null ? (S.price*100).toFixed(1)+'¢' : '—';
  document.getElementById('sv-model').textContent = S.model!==null ? (S.model*100).toFixed(1)+'¢' : '—';
  const edgeEl = document.getElementById('sv-edge');
  if (S.edge!==null) { edgeEl.textContent=(S.edge>0?'+':'')+(S.edge*100).toFixed(1)+'¢'; edgeEl.className='sig-val '+(S.edge>0?'pos':'neg'); }
  else { edgeEl.textContent='—'; edgeEl.className='sig-val'; }
  document.getElementById('sv-size').textContent = S.size ? '$'+S.size.toFixed(0) : '—';
  const btn = document.getElementById('fbtn');
  if (hasEdge && !S.fired) { btn.className='fire-btn ready'; btn.textContent='⚡ DISPARAR YES @ '+(S.price*100).toFixed(1)+'¢'; }
  else if (S.fired) { btn.className='fire-btn fired'; btn.textContent='✓ ORDEN ENVIADA'; }
  else { btn.className='fire-btn disabled'; btn.textContent='DISPARAR ORDEN'; }
}

function fireOrder() {
  if (S.fired || !S.edge || S.edge<=0.03 || S.size<=1) return;
  S.fired = true;
  addLog('ORDEN | YES @ '+(S.price*100).toFixed(1)+'¢ | model '+(S.model*100).toFixed(1)+'¢ | edge +'+(S.edge*100).toFixed(1)+'¢ | $'+S.size.toFixed(0), 'ok');
  addLog('DRY RUN — conecta wallet para órdenes reales', 'warn');
  renderSignal();
  setTimeout(() => {
    S.event=null; S.team=null; S.fired=false; S.edge=null; S.model=null; S.size=0;
    document.querySelectorAll('.ev-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('tbtn-home').className='team-btn';
    document.getElementById('tbtn-away').className='team-btn';
    renderSignal();
  }, 5000);
}

document.getElementById('urlinput').addEventListener('keydown', e => { if(e.key==='Enter') loadEvent(); });
addLog('Pega la URL del partido de Polymarket para empezar', '');
</script>
</body>
</html>
